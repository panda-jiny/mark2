<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <script src="js/jquery-4.0.0.min.js"></script>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header id="header">
      <div class="inner">
        <h1>
          <a href="#index.html"><img src="img/logo_b.png" alt="logo" /></a>
        </h1>
        <ul class="nav">
          <li><a href="#">소개</a></li>
          <li><a href="#">하는 일</a></li>
          <li><a href="#">후원과 참여</a></li>
          <li><a href="#">뉴스</a></li>
        </ul>
        <div class="contact"><a href="#mailto">CONTACT</a></div>
      </div>
    </header>
    <div id="visual">
      <img src="img/wrap_cover.png" alt="wrap_cover" />
      <div class="visual_inner">
        <h2>SAVE OUR LIVES, SAVE OUR FUTURE SAVE OUR LIVES, SAVE OUR FUTURE</h2>
      </div>
      <div class="card01">
        <p>더 늦으면 이 소리조차 들을 수 없을찌도 모릅니다</p>
      </div>
      <div class="card02">
        <p>
          월 3만원의 후원으로 18명의 결식 아이들에게 한솓도시락을 보낼 수
          있습니다.
        </p>
        <div class="donate_box">
          <div class="checker">
            <input type="radio" id="regular" name="donate_type" checked /><label
              for="regular"
              >정기</label
            >
            <input type="radio" id="temporary" name="donate_type" /><label
              for="temporary"
              >일시</label
            >
          </div>
          <div class="amount_input">
            <select name="select_amount" id="select_amount">
              <option value="write">직접 입력</option>
              <option value="100,000">100,000</option>
              <option value="50,000">50,000</option>
              <option value="30,000">30,000</option>
              <input type="text" class="amount" />
              <span>원</span>
            </select>
          </div>
          <button>후원하기</button>
        </div>
      </div>
    </div>
    <div class="content">
      <section class="sec01">
        <h2>어떤 일을 하나요?</h2>
        <ul class="sec01_box">
          <li>
            <input type="radio" name="doing" id="protect" checked /><label
              for="protect"
              ><h3><i class="fa-solid fa-caret-right"></i>보호</h3>
              <p>
                모든 형태의 폭력으로부터 아동이 안전하게 보호받을 수 있도록 법과
                제도를 개선합니다.
              </p></label
            >
          </li>
          <li>
            <input type="radio" name="doing" id="grow" /><label for="grow"
              ><h3><i class="fa-solid fa-caret-right"></i>발달</h3>
              <p>
                아동이 몸과 마음이 건강하고 균형 있게 발달할 권리를 보장받을 수
                있도록 실질적인 정책 변화를 촉구합니다.
              </p></label
            >
          </li>
          <li>
            <input type="radio" name="doing" id="join" /><label for="join"
              ><h3><i class="fa-solid fa-caret-right"></i>참여</h3>
              <p>
                아동이 자신의 삶과 연관된 주제에 목소리를 내고 스스로의 권리를
                주체적으로 행사할 수 있도록 아동 참여 플랫폼을 마련합니다.
              </p></label
            >
          </li>
          <li>
            <input type="radio" name="doing" id="rights" /><label for="rights"
              ><h3><i class="fa-solid fa-caret-right"></i>권리교육</h3>
              <p>
                다양한 주제별 아동권리 교육을 통해 아동권리가 존중받는 환경을
                만듭니다.
              </p></label
            >
          </li>
          <li class="img_card">
            <img src="img/ezgif.com-webp-to-jpg_2_2.webp" alt="보호" />
            <img
              src="img/csm_CoH_Share_Your_Heart_2026_058_9c69a0f124.webp"
              alt="발달"
            />
            <img src="img/csm_Royal_parks_runners_008455de61.webp" alt="참여" />
            <img src="img/do_edu.png" alt="교육" />
          </li>
        </ul>
      </section>
      <section class="sec02">
        <h2>아이들이 후원을 통해 어떤 도움을 받나요?</h2>
      </section>
      <div class="menu_box">
        <input type="radio" name="menu" id="part1" checked />
        <input type="radio" name="menu" id="part2" />
        <input type="radio" name="menu" id="part3" />
        <label for="part1"></label>
        <label for="part2"></label>
        <label for="part3"></label>
      </div>
      <div class="content_box">
        <div class="content_card">
          <a href="#">
            <h3>권리옹호</h3>
            <p>
              아동 권리를 지키기 위해 사회적 공감대를 넓히고 정책을 개선합니다
            </p>
            <div class="detail_link">
              자세히 보기
              <div class="arrbox">
                <i class="fa-solid fa-angles-right"></i
                ><i class="fa-solid fa-angles-right"></i>
              </div>
            </div>
          </a>
        </div>
      </div>
    </div>
    <script src="js/visual_gsap.js"></script>
    <script src="js/section1.js"></script>
  </body>
</html>
